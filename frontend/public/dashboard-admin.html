<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - ShopLink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; }
        
        header { background: #1a5c38; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        nav a { color: white; margin-left: 20px; text-decoration: none; }
        
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-value { font-size: 32px; font-weight: bold; color: #1a5c38; margin: 10px 0; }
        .stat-label { color: #666; font-size: 14px; }
        
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h2 { font-size: 18px; margin-bottom: 15px; color: #1a5c38; border-bottom: 2px solid #1a5c38; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        
        .btn-refresh { background: #1a5c38; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        .btn-refresh:hover { background: #155030; }
        
        .empty-state { text-align: center; padding: 40px; color: #999; }
        
        .loader { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #1a5c38; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">🛍️ ShopLink Admin</div>
        <nav>
            <a href="/index.html">Accueil</a>
            <a href="/payment.html">Nouveau Paiement</a>
        </nav>
    </header>
    
    <div class="container">
        <!-- STATISTICS -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">💳 Paiements Validés</div>
                <div class="stat-value" id="stat-count">-</div>
                <div class="stat-label">Total: <span id="stat-amount">-</span> FCFA</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">👥 Clients Créés</div>
                <div class="stat-value" id="stat-clients">-</div>
                <div class="stat-label">Sites autonomes</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Autonome</div>
                <div class="stat-value" id="stat-autonome-count">-</div>
                <div class="stat-label" id="stat-autonome-amount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 Premium</div>
                <div class="stat-value" id="stat-premium-count">-</div>
                <div class="stat-label" id="stat-premium-amount">-</div>
            </div>
        </div>
        
        <!-- PAYMENTS TABLE -->
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>✅ Paiements Validés</h2>
                <button class="btn-refresh" onclick="loadPayments()">🔄 Actualiser</button>
            </div>
            <div id="payments-container">
                <div class="empty-state"><div class="loader"></div> Chargement...</div>
            </div>
        </div>
        
        <!-- CLIENTS TABLE -->
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>✨ Clients & Sites Créés</h2>
                <button class="btn-refresh" onclick="loadClients()">🔄 Actualiser</button>
            </div>
            <div id="clients-container">
                <div class="empty-state"><div class="loader"></div> Chargement...</div>
            </div>
        </div>
    </div>
    
    <script src="/js/api-config.js"></script>
    <script>
        const API_BASE = window.SHOPLINK_API_BASE;
        
        // Load payments on page load
        window.addEventListener('load', () => {
            loadPayments();
            loadClients();
            
            // Auto-refresh every 5 seconds
            setInterval(() => {
                loadPayments();
                loadClients();
            }, 5000);
        });
        
        async function loadPayments() {
            try {
                const res = await fetch(`${API_BASE}/admin/payments/validated`);
                const data = await res.json();
                
                if (data.success && data.payments && data.payments.length > 0) {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Client</th>
                                    <th>Type</th>
                                    <th>Montant</th>
                                    <th>Provider</th>
                                    <th>Statut</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    let totalAmount = 0;
                    let autonomeCount = 0, autonomeTotal = 0;
                    let premiumCount = 0, premiumTotal = 0;
                    
                    data.payments.forEach(p => {
                        const date = new Date(p.validatedAt || p.updatedAt).toLocaleDateString('fr-FR');
                        const type = p.type || 'autonome';
                        const provider = p.mobileMoneyProvider ? p.mobileMoneyProvider.toUpperCase() : 'N/A';
                        
                        totalAmount += p.amount || 0;
                        
                        if (type === 'autonome') {
                            autonomeCount++;
                            autonomeTotal += p.amount || 0;
                        } else {
                            premiumCount++;
                            premiumTotal += p.amount || 0;
                        }
                        
                        html += `
                            <tr>
                                <td>${p.clientName || 'Client'}</td>
                                <td><span class="badge ${type === 'autonome' ? 'badge-success' : 'badge-warning'}">${type}</span></td>
                                <td style="font-weight: bold; color: #1a5c38;">${(p.amount || 0).toLocaleString('fr-FR')} FCFA</td>
                                <td>${provider}</td>
                                <td><span class="badge badge-success">✓ Payé</span></td>
                                <td>${date}</td>
                            </tr>
                        `;
                    });
                    
                    html += `</tbody></table>`;
                    
                    // Update stats
                    document.getElementById('stat-count').textContent = data.payments.length;
                    document.getElementById('stat-amount').textContent = totalAmount.toLocaleString('fr-FR');
                    document.getElementById('stat-autonome-count').textContent = autonomeCount;
                    document.getElementById('stat-autonome-amount').textContent = autonomeTotal.toLocaleString('fr-FR') + ' FCFA';
                    document.getElementById('stat-premium-count').textContent = premiumCount;
                    document.getElementById('stat-premium-amount').textContent = premiumTotal.toLocaleString('fr-FR') + ' FCFA';
                    
                    document.getElementById('payments-container').innerHTML = html;
                } else {
                    document.getElementById('payments-container').innerHTML = '<div class="empty-state">Aucun paiement validé</div>';
                    document.getElementById('stat-count').textContent = '0';
                    document.getElementById('stat-amount').textContent = '0';
                }
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('payments-container').innerHTML = '<div class="empty-state">❌ Erreur de connexion à l\'API</div>';
            }
        }
        
        async function loadClients() {
            try {
                const res = await fetch(`${API_BASE}/admin/auto-created-clients`);
                const data = await res.json();
                
                if (data.success && data.clients && data.clients.length > 0) {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Client</th>
                                    <th>Email</th>
                                    <th>Téléphone</th>
                                    <th>Montant</th>
                                    <th>Site Créé</th>
                                    <th>Provider</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    data.clients.forEach(c => {
                        const siteName = c.site?.name || c.siteSlug || 'Site créé';
                        const provider = c.provider ? c.provider.toUpperCase() : 'N/A';
                        
                        html += `
                            <tr>
                                <td><strong>${c.clientName || 'Client'}</strong></td>
                                <td>${c.email || 'N/A'}</td>
                                <td>${c.phone || 'N/A'}</td>
                                <td style="font-weight: bold; color: #28a745;">${(c.amount || 0).toLocaleString('fr-FR')} FCFA</td>
                                <td><span class="badge badge-info">${siteName}</span></td>
                                <td>${provider}</td>
                            </tr>
                        `;
                    });
                    
                    html += `</tbody></table>`;
                    
                    document.getElementById('stat-clients').textContent = data.clients.length;
                    document.getElementById('clients-container').innerHTML = html;
                } else {
                    document.getElementById('clients-container').innerHTML = '<div class="empty-state">Aucun client créé</div>';
                    document.getElementById('stat-clients').textContent = '0';
                }
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('clients-container').innerHTML = '<div class="empty-state">❌ Erreur de connexion à l\'API</div>';
            }
        }
    </script>
</body>
</html>
