<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopLink — Mot de passe oublié</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="/js/api-config.js"></script>
  <style>
    :root{
      --dark-green:#1B3A2D; --orange:#E8A020; --cream:#FFF8EE;
      --green:#1B3A2D; --green-light:#e8f5ee; --green-mid:#2e9967;
      --amber:#E8A020; --amber-light:#fff6e0;
      --dark:#0f1f17; --bg:#FFF8EE; --white:#fff;
      --border:#e5e7eb; --text:#1a1a2e; --muted:#6b7280; --soft:#9a7d5a;
      --radius:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    h1,h2{font-family:'Syne',sans-serif;}

    /* NAV */
    nav{background:var(--dark-green);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-size:17px;font-weight:500;color:#fff;display:flex;align-items:center;gap:7px;text-decoration:none;}
    .logo-dot{width:7px;height:7px;background:var(--orange);border-radius:50%;}
    .nav-link{color:rgba(255,255,255,0.7);font-size:13px;text-decoration:none;}
    .nav-link:hover{color:#fff;}

    /* MAIN */
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

    .form-container{
      background:var(--white);
      border:1.5px solid var(--border);
      border-radius:var(--radius);
      padding:40px;
      max-width:480px;
      width:100%;
    }

    .form-header{text-align:center;margin-bottom:32px;}
    .form-title{font-size:28px;font-weight:800;color:var(--dark-green);margin-bottom:8px;}
    .form-sub{font-size:14px;color:var(--muted);line-height:1.6;}

    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
    .form-label{font-size:13px;color:var(--muted);font-weight:500;}
    .form-input{padding:12px 14px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .form-input:focus{border-color:var(--dark-green);}
    .error-msg{font-size:12px;color:#e24b4a;}

    .btn-submit{width:100%;background:var(--dark-green);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn-submit:hover{background:#0f2d20;transform:translateY(-1px);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

    .back-link{display:inline-block;margin-top:20px;color:var(--dark-green);text-decoration:none;font-weight:500;font-size:14px;}
    .back-link:hover{color:var(--orange);}

    .success-box{display:none;background:var(--green-light);border:1px solid #9fe1cb;border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;}
    .success-box.show{display:block;}
    .global-error{display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:13px;color:#a32d2d;}
    .global-error.show{display:block;}

    @media (max-width: 768px) {
      .form-container{padding:28px 20px;}
      nav{padding:0 20px;}
      .form-title{font-size:24px;}
      .form-sub{font-size:13px;}
      .form-input{font-size:16px;} /* Prevent zoom on iOS */
      .btn-submit{font-size:16px;padding:14px;}
    }

    @media (max-width: 480px) {
      nav{padding:0 16px;height:50px;}
      .logo{font-size:15px;}
      .nav-link{font-size:11px;}
      
      .main{padding:30px 16px;}
      .form-container{padding:24px 16px;}
      .form-title{font-size:22px;}
      .form-sub{font-size:12px;}
      
      .form-group{margin-bottom:16px;}
      .form-label{font-size:12px;}
      .form-input{padding:11px 13px;font-size:16px;}
      
      .btn-submit{padding:12px;font-size:15px;}
      .back-link{font-size:13px;}
      
      .success-box{padding:14px 16px;}
      .success-box strong{font-size:13px;}
      .success-box div{font-size:12px;}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/css/responsive.css"/>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/index.html" class="logo"><span class="logo-dot"></span>ShopLink</a>
  <a href="/login.html" class="nav-link">Se connecter →</a>
</nav>

<div class="main">
  <div class="form-container">
    <div class="form-header">
      <div class="form-title">Mot de passe oublié ?</div>
      <div class="form-sub">Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</div>
    </div>

    <div class="success-box" id="success-box">
      <strong style="color:var(--green-mid);">✓ Lien généré !</strong>
      <div style="font-size:13px;color:var(--green-mid);margin-top:3px;">
        Cliquez sur le lien ci-dessous pour réinitialiser votre mot de passe :
        <br><br>
        <a id="reset-link" href="#" target="_blank" style="color:var(--dark-green);text-decoration:underline;font-weight:500;">Chargement...</a>
        <br><br>
        <span style="font-size:11px;">Ce lien expire dans 1 heure</span>
      </div>
    </div>

    <div class="global-error" id="global-error"></div>

    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>
        <div class="error-msg" id="err-email"></div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Envoyer le lien de réinitialisation</button>
    </form>

    <a href="/login.html" class="back-link">← Retour à la connexion</a>
  </div>
</div>

<script>
  const form = document.getElementById('forgot-form');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submit-btn');

  // Validation
  emailInput.addEventListener('input', () => {
    const val = emailInput.value.trim();
    if (!val) {
      document.getElementById('err-email').textContent = 'Veuillez entrer votre adresse email';
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      document.getElementById('err-email').textContent = 'Format email invalide (ex: nom@exemple.com)';
    } else {
      document.getElementById('err-email').textContent = '';
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = emailInput.value.trim();

    // Validation avant envoi
    if (!email) {
      document.getElementById('global-error').textContent = 'Veuillez entrer votre adresse email';
      document.getElementById('global-error').classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours...';

    try {
      const res = await fetch(window.SHOPLINK_API_BASE + '/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('reset-link').href = data.resetLink;
        document.getElementById('reset-link').textContent = data.resetLink;
        document.getElementById('success-box').classList.add('show');
        form.style.display = 'none';
      } else {
        document.getElementById('global-error').textContent = data.message || 'Erreur lors de l\'envoi de l\'email';
        document.getElementById('global-error').classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Envoyer le lien de réinitialisation';
      }
    } catch(err) {
      document.getElementById('global-error').textContent = 'Erreur de connexion au serveur';
      document.getElementById('global-error').classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer le lien de réinitialisation';
    }
  });
</script>
<script src="/js/mobile-nav.js"></script>

</body>
</html>
