<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>ShopLink — Réinitialiser le mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="/js/api-config.js"></script>
  <style>
    :root{
      --dark-green:#1a5c38; --orange:#E8620A; --cream:#F5F0E8;
      --green:#1a5c38; --green-light:#eef7f1; --green-mid:#0f6e56;
      --amber:#E8620A; --amber-light:#fff6e0;
      --dark:#111111; --bg:#F5F0E8; --white:#fff;
      --border:rgba(17,17,17,0.10); --text:#1a1a1a; --muted:rgba(17,17,17,0.52); --soft:#9a7d5a;
      --radius:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:radial-gradient(circle at 50% -8%, rgba(245,156,26,0.16), transparent 32%),radial-gradient(circle at 12% 12%, rgba(26,92,56,0.14), transparent 28%),var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    h1,h2{font-family:'Syne',sans-serif;}

    .hamburger-btn,
    .mobile-nav-menu,
    .mobile-nav-overlay,
    #mobile-nav-menu,
    #mobile-nav-overlay {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--green);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 10px 30px rgba(17,17,17,0.16);}
    .logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.16);box-shadow:inset 0 1px 0 rgba(255,255,255,0.12);}
    .logo-dot{width:7px;height:7px;background:var(--amber);border-radius:50%;box-shadow:0 0 0 3px rgba(232,98,10,0.18);}
    .nav-link{color:rgba(255,255,255,0.78);font-size:13px;text-decoration:none;font-weight:600;}
    .nav-link:hover{color:#fff;}

    /* MAIN */
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:96px 20px 40px;}

    .form-container{
      background:var(--white);
      border:1.5px solid var(--border);
      border-radius:var(--radius);
      padding:40px;
      max-width:480px;
      width:100%;
    }

    .form-header{text-align:center;margin-bottom:32px;}
    .form-title{font-size:28px;font-weight:800;color:var(--dark-green);margin-bottom:8px;}
    .form-sub{font-size:14px;color:var(--muted);line-height:1.6;}

    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
    .form-label{font-size:13px;color:var(--muted);font-weight:500;}
    .form-input{padding:12px 14px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .form-input:focus{border-color:var(--dark-green);}
    .error-msg{font-size:12px;color:#e24b4a;}

    .password-field{position:relative;display:flex;align-items:center;}
    .password-field .form-input{width:100%;padding-right:48px;}
    .password-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:0;border-radius:10px;background:var(--green-light);color:var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;line-height:1;}
    .password-toggle svg{width:1em;height:1em;display:block;}
    .password-toggle.is-visible{color:var(--soft);}
    .password-toggle:active{transform:translateY(-50%) scale(0.96);}

    .btn-submit{width:100%;background:var(--dark-green);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn-submit:hover{background:#0f2d20;transform:translateY(-1px);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

    .back-link{display:inline-block;margin-top:20px;color:var(--dark-green);text-decoration:none;font-weight:500;font-size:14px;}
    .back-link:hover{color:var(--orange);}

    .success-box{display:none;background:var(--green-light);border:1px solid #9fe1cb;border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;}
    .success-box.show{display:block;}
    .global-error{display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:13px;color:#a32d2d;}
    .global-error.show{display:block;}

    @media (max-width: 768px) {
      nav{padding:0 16px;height:48px;min-height:48px;}
      .nav-link{font-size:12px;}
      .form-container{padding:28px 20px;}
      .form-title{font-size:24px;}
      .form-sub{font-size:13px;}
      .form-input{font-size:16px;} /* Prevent zoom on iOS */
      .btn-submit{font-size:16px;padding:14px;}
    }

    @media (max-width: 480px) {
      nav{padding:0 12px;height:44px;min-height:44px;}
      .logo{font-size:14px;padding:6px 10px;}
      .nav-link{font-size:11px;}
      .main{padding:74px 16px 30px;}
      .form-container{padding:24px 16px;}
      .form-title{font-size:22px;}
      .form-sub{font-size:12px;}
      
      .form-group{margin-bottom:16px;}
      .form-label{font-size:12px;}
      .form-input{padding:11px 13px;font-size:16px;}
      
      .btn-submit{padding:12px;font-size:15px;}
      .back-link{font-size:13px;}
      
      .success-box{padding:14px 16px;}
      .success-box strong{font-size:13px;}
      .success-box div{font-size:12px;}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/css/responsive.css"/>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/index.html" class="logo"><span class="logo-dot"></span>ShopLink</a>
  <a href="/login.html" class="nav-link">Se connecter</a>
</nav>

<div class="main">
  <div class="form-container">
    <div class="form-header">
      <div class="form-title">Nouveau mot de passe</div>
      <div class="form-sub">Entrez votre nouveau mot de passe pour terminer la réinitialisation.</div>
    </div>

    <div class="success-box" id="success-box">
      <strong style="color:var(--green-mid);">✓ Mot de passe modifié !</strong>
      <div style="font-size:13px;color:var(--green-mid);margin-top:3px;">Connexion automatique en cours...</div>
    </div>

    <div class="global-error" id="global-error"></div>

    <form id="reset-form" method="POST" novalidate>
      <input type="hidden" id="token-input" name="token" value=""/>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <div class="password-field">
          <input class="form-input" type="password" id="password" name="newPassword" placeholder="Minimum 6 caractères" autocomplete="new-password"/>
          <button class="password-toggle" type="button" onclick="togglePasswordVisibility('password', this)" aria-label="Afficher le mot de passe"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" fill-rule="evenodd" d="m18.922 16.8l3.17 3.17l-1.06 1.061L4.06 4.061L5.12 3l2.74 2.738A11.9 11.9 0 0 1 12 5c4.808 0 8.972 2.848 11 7a12.66 12.66 0 0 1-4.078 4.8m-8.098-8.097l4.473 4.473a3.5 3.5 0 0 0-4.474-4.474zm5.317 9.56A11.9 11.9 0 0 1 12 19c-4.808 0-8.972-2.848-11-7a12.66 12.66 0 0 1 4.078-4.8l3.625 3.624a3.5 3.5 0 0 0 4.474 4.474l2.964 2.964z"/></svg></button>
        </div>
        <div class="error-msg" id="err-password"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <div class="password-field">
          <input class="form-input" type="password" id="password2" placeholder="Répétez votre mot de passe" autocomplete="new-password"/>
          <button class="password-toggle" type="button" onclick="togglePasswordVisibility('password2', this)" aria-label="Afficher le mot de passe"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" fill-rule="evenodd" d="m18.922 16.8l3.17 3.17l-1.06 1.061L4.06 4.061L5.12 3l2.74 2.738A11.9 11.9 0 0 1 12 5c4.808 0 8.972 2.848 11 7a12.66 12.66 0 0 1-4.078 4.8m-8.098-8.097l4.473 4.473a3.5 3.5 0 0 0-4.474-4.474zm5.317 9.56A11.9 11.9 0 0 1 12 19c-4.808 0-8.972-2.848-11-7a12.66 12.66 0 0 1 4.078-4.8l3.625 3.624a3.5 3.5 0 0 0 4.474 4.474l2.964 2.964z"/></svg></button>
        </div>
        <div class="error-msg" id="err-password2"></div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Mettre à jour le mot de passe</button>
    </form>

    <a href="/login.html" class="back-link">← Retour à la connexion</a>
  </div>
</div>

<script>
  const form = document.getElementById('reset-form');
  const tokenInput = document.getElementById('token-input');
  const passwordInput = document.getElementById('password');
  const password2Input = document.getElementById('password2');
  const submitBtn = document.getElementById('submit-btn');

  function togglePasswordVisibility(inputId, button) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const shouldShow = input.type === 'password';
    input.type = shouldShow ? 'text' : 'password';
    button.classList.toggle('is-visible', shouldShow);
    button.setAttribute('aria-label', shouldShow ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
  }

  // Get token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const resetError = urlParams.get('error');

  form.action = `${window.location.protocol}//${window.location.hostname}:5000/api/auth/reset-password-form`;
  tokenInput.value = token || '';

  if (resetError) {
    document.getElementById('global-error').textContent = resetError;
    document.getElementById('global-error').classList.add('show');
  }

  if (!token) {
    document.getElementById('global-error').textContent = 'Lien de réinitialisation invalide. Veuillez demander un nouveau lien.';
    document.getElementById('global-error').classList.add('show');
    form.style.display = 'none';
  }

  // Validation
  passwordInput.addEventListener('input', () => {
    const val = passwordInput.value;
    if (!val) {
      document.getElementById('err-password').textContent = 'Veuillez entrer votre mot de passe';
    } else if (val.length < 6) {
      document.getElementById('err-password').textContent = 'Le mot de passe doit contenir au moins 6 caractères';
    } else {
      document.getElementById('err-password').textContent = '';
    }
  });

  password2Input.addEventListener('input', () => {
    const val = password2Input.value;
    if (!val) {
      document.getElementById('err-password2').textContent = 'Veuillez confirmer votre mot de passe';
    } else if (val !== passwordInput.value) {
      document.getElementById('err-password2').textContent = 'Les mots de passe ne correspondent pas';
    } else {
      document.getElementById('err-password2').textContent = '';
    }
  });

  form.addEventListener('submit', (e) => {
    const password = passwordInput.value;
    const password2 = password2Input.value;

    // Validation avant envoi
    if (!password || !password2) {
      e.preventDefault();
      document.getElementById('global-error').textContent = 'Veuillez remplir tous les champs';
      document.getElementById('global-error').classList.add('show');
      return;
    }

    if (password.length < 6) {
      e.preventDefault();
      document.getElementById('global-error').textContent = 'Le mot de passe doit contenir au moins 6 caractères';
      document.getElementById('global-error').classList.add('show');
      return;
    }

    if (password !== password2) {
      e.preventDefault();
      document.getElementById('global-error').textContent = 'Les mots de passe ne correspondent pas';
      document.getElementById('global-error').classList.add('show');
      return;
    }

    tokenInput.value = token;
    submitBtn.textContent = 'Mise à jour en cours...';
  });
</script>
</body>
</html>
